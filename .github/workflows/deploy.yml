name: CD — Build & Deploy

on:
  push:
    branches: [main]

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: saib-api

jobs:
  config-check:
    name: Validate CD Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        env:
          HAS_ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER != '' }}
          HAS_ACR_USERNAME: ${{ secrets.ACR_USERNAME != '' }}
          HAS_ACR_PASSWORD: ${{ secrets.ACR_PASSWORD != '' }}
          HAS_APP_NAME_DEV: ${{ secrets.AZURE_APP_SERVICE_NAME_DEV != '' }}
          HAS_PUBLISH_PROFILE_DEV: ${{ secrets.AZURE_PUBLISH_PROFILE_DEV != '' }}
          HAS_APP_NAME_PROD: ${{ secrets.AZURE_APP_SERVICE_NAME_PROD != '' }}
          HAS_PUBLISH_PROFILE_PROD: ${{ secrets.AZURE_PUBLISH_PROFILE_PROD != '' }}
        run: |
          if [ "$HAS_ACR_LOGIN_SERVER" != "true" ] || [ "$HAS_ACR_USERNAME" != "true" ] || [ "$HAS_ACR_PASSWORD" != "true" ]; then
            echo "::warning::CD skipped: missing ACR secrets (ACR_LOGIN_SERVER/ACR_USERNAME/ACR_PASSWORD)."
          fi
          if [ "$HAS_APP_NAME_DEV" != "true" ] || [ "$HAS_PUBLISH_PROFILE_DEV" != "true" ]; then
            echo "::warning::DEV deploy skipped: missing AZURE_APP_SERVICE_NAME_DEV or AZURE_PUBLISH_PROFILE_DEV."
          fi
          if [ "$HAS_APP_NAME_PROD" != "true" ] || [ "$HAS_PUBLISH_PROFILE_PROD" != "true" ]; then
            echo "::warning::PROD deploy skipped: missing AZURE_APP_SERVICE_NAME_PROD or AZURE_PUBLISH_PROFILE_PROD."
          fi

  build-and-push:
    name: Build & Push Docker Image
    needs: config-check
    if: ${{ secrets.ACR_LOGIN_SERVER != '' && secrets.ACR_USERNAME != '' && secrets.ACR_PASSWORD != '' }}
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "image-tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Build production image
        run: |
          docker build \
            -f infra/docker/Dockerfile \
            -t ${{ steps.meta.outputs.image-tag }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push image
        run: |
          docker push ${{ steps.meta.outputs.image-tag }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

  deploy-dev:
    name: Deploy to DEV
    needs: build-and-push
    if: ${{ needs.build-and-push.result == 'success' && secrets.AZURE_APP_SERVICE_NAME_DEV != '' && secrets.AZURE_PUBLISH_PROFILE_DEV != '' }}
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Deploy to Azure App Service (DEV)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME_DEV }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_DEV }}
          images: ${{ needs.build-and-push.outputs.image-tag }}

      - name: Smoke test DEV
        run: |
          sleep 15
          curl -f https://${{ secrets.DEV_URL }}/health || exit 1

  deploy-prod:
    name: Deploy to PROD
    needs: deploy-dev
    if: ${{ needs.deploy-dev.result == 'success' && secrets.AZURE_APP_SERVICE_NAME_PROD != '' && secrets.AZURE_PUBLISH_PROFILE_PROD != '' }}
    runs-on: ubuntu-latest
    environment: production   # requires manual approval in GitHub Environments

    steps:
      - name: Deploy to Azure App Service (PROD)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME_PROD }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_PROD }}
          images: ${{ needs.build-and-push.outputs.image-tag }}

      - name: Smoke test PROD
        run: |
          sleep 20
          curl -f https://${{ secrets.PROD_URL }}/health || exit 1
