name: CD — Build & Deploy

on:
  push:
    branches: [main]

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: saib-api

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "image-tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Build production image
        run: |
          docker build \
            -f infra/docker/Dockerfile \
            -t ${{ steps.meta.outputs.image-tag }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push image
        run: |
          docker push ${{ steps.meta.outputs.image-tag }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

  deploy-dev:
    name: Deploy to DEV
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Deploy to Azure App Service (DEV)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME_DEV }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_DEV }}
          images: ${{ needs.build-and-push.outputs.image-tag }}

      - name: Smoke test DEV
        run: |
          sleep 15
          curl -f https://${{ secrets.DEV_URL }}/health || exit 1

  deploy-prod:
    name: Deploy to PROD
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: production   # requires manual approval in GitHub Environments

    steps:
      - name: Deploy to Azure App Service (PROD)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME_PROD }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_PROD }}
          images: ${{ needs.build-and-push.outputs.image-tag }}

      - name: Smoke test PROD
        run: |
          sleep 20
          curl -f https://${{ secrets.PROD_URL }}/health || exit 1
